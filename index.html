<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>蝶翠峰智慧巴士到站顯示器</title>
<style>
    body { background: black; font-family: 'Courier New', monospace; padding: 10px; margin: 0; color: white; user-select: none; }
    ::-webkit-scrollbar { display: none; }
    h2 { margin: 0 0 10px 0; font-size: 20px; text-align: center; }
    .section { font-size: 18px; margin: 15px 0 8px 0; padding-bottom: 5px; border-bottom: 2px solid #333; font-weight: bold; }
    .outbound { color: #00ffcc; }
    .inbound { color: #ffd400; }
    .route-block { margin-bottom: 10px; background: #0a0a0a; border-radius: 6px; padding: 8px; border: 1px solid #111; }
    .route-title { font-size: 28px; color: #ffd400; font-weight: bold; margin-bottom: 2px; }
    .bus-row { display: grid; grid-template-columns: 1fr 100px; border-bottom: 1px dashed #222; padding: 6px 0; align-items: center; }
    .bus-row:last-child { border-bottom: none; }
    .dest { font-size: 16px; }
    .rmk { font-size: 12px; color: #888; display: block; margin-top: 2px; }
    .time { font-size: 28px; text-align: right; color: #00ff00; font-weight: bold; }
    .time.warn { color: #ffff00; }
    .time.arriving { color: #ff3333; animation: blink 1s infinite; }
    /* 修正點：將未提供的字體大小設為 14px (約原先 28px 的一半) */
    .time.null { font-size: 14px; color: #666; text-align: right; padding-top: 5px; }
    @keyframes blink { 50% { opacity: 0.2; } }
    .status { margin-top: 20px; border-top: 1px solid #333; padding: 10px; color: #666; font-size: 12px; text-align: center; }
</style>
</head>
<body>

<h2>🚌 蝶翠峰智慧到站裝置</h2>
<div id="dir1" class="outbound"></div>
<div id="dir2" class="inbound"></div>
<div id="statusBar" class="status">初始化系統...</div>

<script>
const MY_STOPS = { "dir1": "41C9CAACDC573B48", "dir2": "D412D24055680560" };
const ROUTE_ORDER = ["68E", "68F", "268C", "968"];
startAutoScroll(); 

async function updateAll() {
    for (const [divId, stopId] of Object.entries(MY_STOPS)) {
        await fetchAndRender(stopId, divId);
    }
    document.getElementById("statusBar").innerText = `最後更新: ${new Date().toLocaleTimeString()}`;
}

async function fetchAndRender(stopId, divId) {
    const container = document.getElementById(divId);
    try {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${stopId}`);
        const result = await res.json();
        
        if (!result.data) return;

        const grouped = result.data.reduce((acc, cur) => {
            if (!acc[cur.route]) acc[cur.route] = [];
            acc[cur.route].push(cur);
            return acc;
        }, {});

        let html = `<div class="section">${divId === 'dir1' ? '➡ 外出方向' : '⬅ 返回方向'}</div>`;
        
        Object.keys(grouped).sort((a, b) => {
            let iA = ROUTE_ORDER.indexOf(a);
            let iB = ROUTE_ORDER.indexOf(b);
            if (iA === -1) iA = 99;
            if (iB === -1) iB = 99;
            return iA - iB;
        }).forEach(route => {
            html += `<div class="route-block"><div class="route-title">${route}</div>`;
            
            const withEta = grouped[route].filter(b => b.eta).sort((a,b) => new Date(a.eta) - new Date(b.eta));
            const noEta = grouped[route].filter(b => !b.eta);

            withEta.slice(0, 3).forEach(bus => {
                const diff = Math.ceil((new Date(bus.eta) - new Date()) / 60000);
                const cls = diff <= 4 ? "time arriving" : (diff <= 8 ? "time warn" : "time");
                html += `<div class="bus-row"><div class="dest">${bus.dest_tc}<span class="rmk">${bus.rmk_tc || ''}</span></div><div class="${cls}">${diff <= 1 ? "即將" : diff + "<span style='font-size:14px;'>分</span>"}</div></div>`;
            });

            noEta.forEach(bus => {
                html += `<div class="bus-row"><div class="dest">${bus.dest_tc}<span class="rmk">${bus.rmk_tc || ''}</span></div><div class="time null">未提供</div></div>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
    } catch (e) { console.error(e); }
}

updateAll();
setInterval(updateAll, 25000);

function startAutoScroll() {
  let direction = 1; 
  setInterval(() => {
    let scrollHeight = document.documentElement.scrollHeight;
    let clientHeight = document.documentElement.clientHeight;
    let scrollTop = window.scrollY || document.documentElement.scrollTop;

    if (scrollHeight <= clientHeight) return;

    if (scrollTop + clientHeight >= scrollHeight - 2 && direction === 1) {
      direction = 0; 
      setTimeout(() => { direction = -1; }, 3000);
    } 
    else if (scrollTop <= 0 && direction === -1) {
      direction = 0; 
      setTimeout(() => { direction = 1; }, 3000);
    }

    if (direction !== 0) {
      window.scrollBy(0, direction * 1); 
    }
  }, 40); 
}
</script>
</body>
</html>
